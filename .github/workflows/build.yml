name: Build and push Docker image

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write   # Required in order to publish on ghcr.io

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # Configure buildx to use the cache
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/carlota-juarez/app-mne-bids:full
          # to reuse unmodified layers across runs
          cache-from: type=gha
          cache-to: type=gha,mode=max
        # Use the image's digest to reference it from the main (automatic push from the main)
      - name: Update main with new image digest
        run: |
          IMAGE_REF="ghcr.io/carlota-juarez/app-mne-bids@${{ steps.build.outputs.digest }}"
          sed -i -E "s#docker://ghcr\.io/carlota-juarez/app-mne-bids(@sha256:[a-f0-9]+|:full)#docker://${IMAGE_REF}#" main
          grep -q "$IMAGE_REF" main && echo "main updated correctly" || (echo "ERROR: main not updated" && exit 1)

      - name: Commit updated main
        run: |
          git config user.name "carlota-juarez"
          git config user.email "carlota.juarez@alumnos.upm.es"
          git add main
          git diff --staged --quiet || git commit -m "build: auto-update image SHA digest [skip ci]"
          git push
